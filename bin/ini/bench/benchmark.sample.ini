[benchmark]
; 要测试的策略类型，支持逗号分隔多个
; 可选：percent_change, ma_cross
strategy_types=percent_change
; 行情输入频率（Hz），可配置多个做批量测试
; 1000=每秒1000条，5000=每秒5000条，10000=每秒10000条
data_frequencies_hz=1000,5000,10000,100000
; 每个“策略+频率”组合重复跑多少轮
runs_per_case=8
; 每轮正式统计前的预热tick数量（用于让策略状态稳定）
warmup_ticks=1000
; 每轮正式统计的tick数量
ticks_per_run=50000
; true=突发模式（尽快推送，不按真实节奏sleep）
; false=按frequency_hz节流，更接近实时行情节奏
burst_mode=true
; 行情生成的基准价格（昨收基准）
base_price=100.0
; 行情波动强度（基点 bps），1bps=0.01%
; 值越大，价格序列波动越剧烈
volatility_bps=12.0
; 随机种子（保证可复现）
random_seed=42
; 策略发信号时默认下单量（仅用于benchmark信号模拟）
default_order_volume=100
; percent_change 策略参数：涨幅达到该值触发买信号（单位：%）
buy_trigger_pct=1.2
; percent_change 策略参数：跌幅达到该值触发卖信号（单位：%）
sell_trigger_pct=-1.2
; 结果输出CSV文件名（相对运行目录）
report_output_file=benchmark_report.csv